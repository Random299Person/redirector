<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    (function () {
      var host = window.location.hostname.replace(/rp299\.com$/, 'rp299.dev');
      var newUrl =
        window.location.protocol +
        '//' +
        host +
        window.location.pathname +
        window.location.search +
        window.location.hash;
      window.location.replace(newUrl);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=https://rp299.dev">
  </noscript>
</head>
<body>
  <p>Redirecting to <a href="https://rp299.dev">rp299.dev</a>&hellip;</p>
</body>
</html>
